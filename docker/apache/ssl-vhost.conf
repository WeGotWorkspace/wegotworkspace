# HTTPS vhost for WebDAV / CalDAV / CardDAV (requires trusted certs on the host).
<VirtualHost *:443>
    ServerName wegotworkspace.localhost
    DocumentRoot /var/www/install

    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/wegotworkspace.localhost.pem
    SSLCertificateKeyFile /etc/apache2/certs/wegotworkspace.localhost-key.pem

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

    <IfModule mod_dir.c>
        DirectoryIndex index.php
    </IfModule>

    # Aliases live in wgw-vhost.conf (global). DocumentRoot stays the install shell for UI/WebDAV.

</VirtualHost>
