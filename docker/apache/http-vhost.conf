# Plain HTTP when TLS certs are not mounted (e.g. CI / :9080 health checks).
# wgw-vhost.conf (always enabled) supplies Directory/Alias rules; this vhost binds :80.
<VirtualHost *:80>
    ServerName wegotworkspace.local
    DocumentRoot /var/www/install

    <IfModule mod_dir.c>
        DirectoryIndex index.php
    </IfModule>
</VirtualHost>
