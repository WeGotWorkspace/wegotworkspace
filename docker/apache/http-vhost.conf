# Plain HTTP when TLS certs are not mounted (e.g. CI / :9080 health checks).
# wgw-vhost.conf (always enabled) supplies Directory/Alias rules; this vhost binds :80.
<VirtualHost *:80>
    ServerName wegotworkspace.local
    DocumentRoot /var/www/install

    <IfModule mod_dir.c>
        DirectoryIndex index.php
    </IfModule>
</VirtualHost>

# Same API/UI aliases as ssl-vhost + vhost.conf (required when wgw-http-vhost is used instead of redirect-only :80).
Alias /api /var/www/packages/api/public
Alias /apps /var/www/packages/apps/dist
Alias /office /var/www/packages/apps/dist/office
Alias /swagger /var/www/packages/api/public/swagger
