# API/UI aliases for every vhost (HTTP, HTTPS, and :9080). Do not put these only in wgw-http-vhost —
# that conf is disabled when TLS certs are mounted.
Alias /api /var/www/packages/api/public
Alias /apps /var/www/packages/apps/dist
Alias /office /var/www/packages/apps/dist/office
Alias /swagger /var/www/packages/api/public/swagger

# Shared directory policy for install docroot (all vhosts).
<Directory /var/www/install>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory /var/www/packages/api/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory /var/www/packages/apps/dist>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

LimitRequestBody 536870912
