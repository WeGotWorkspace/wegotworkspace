# fallow.toml — codebase hygiene for WeGotWorkspace monorepo
# https://docs.fallow.tools

entry = [
  "commitlint.config.mjs",
  "packages/api/package.json",
  "packages/apps/package.json",
  "tools/git/*.mjs",
  "packages/api/scripts/*.mjs",
]

ignorePatterns = [
  "apps/wegotworkspace/**",
  "tools/office-website/**",
  "packages/api/tests/fixtures/**",
]

[[ignoreExports]]
file = "packages/api/openapi/generated/installer-types.ts"
exports = ["InstallerSchemas", "InstallerPaths", "InstallerChecks", "OkResponse"]

[duplicates]
minOccurrences = 4
ignore = ["**/openapi/generated/**"]

[health]
maxCyclomatic = 50
maxCognitive = 60
maxCrap = 2500
ignore = ["**/*.stories.tsx", "**/*.test.ts", "**/*.test.tsx"]

[rules]
"unused-dev-dependencies" = "warn"
