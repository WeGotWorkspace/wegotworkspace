<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesh + collaborative editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="row">
    <input type="text" id="name" placeholder="Your name" maxlength="40" />
    <button id="joinBtn">Join</button>
    <button id="leaveBtn" class="secondary" disabled>Leave</button>
    <button id="saveBtn" class="secondary" disabled>Save</button>
  </div>

  <p id="status">Not connected.</p>
  <p id="docStatus" class="doc-status"></p>

  <section class="editor-section">
    <div id="editor" class="tiptap-editor"></div>
    <p class="editor-footer">Click <strong>Join</strong> · TipTap + Yjs over mesh (<code>signal.php</code> + WebRTC, no WebSockets)</p>
  </section>

  <section class="peers-section">
    <h2>Mesh peers</h2>
    <ul id="peerList"></ul>
  </section>

  <script type="module" src="/main.js"></script>
</body>
</html>
