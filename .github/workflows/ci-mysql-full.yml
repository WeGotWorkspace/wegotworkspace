name: CI MySQL (full)

# MySQL parity safety net: runs the ENTIRE PHPUnit suite against MySQL.
# PR CI only runs the MySQL parity subset (see ci.yml `api-mysql`); this workflow
# guarantees full MySQL coverage without adding wall-clock to every pull request.
# Triggers: pushes to main, a nightly schedule, and manual dispatch.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ci-mysql-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-mysql-full:
    name: API tests (full MySQL suite)
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wgw_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_mysql, pdo_sqlite, simplexml, zip
          coverage: none

      - name: Cache Composer vendor
        uses: actions/cache@v4
        with:
          path: packages/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('packages/api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: API tests (full MySQL suite)
        env:
          WGW_TEST_DRIVER: mysql
          WGW_TEST_MYSQL_HOST: 127.0.0.1
          WGW_TEST_MYSQL_PORT: 3306
          WGW_TEST_MYSQL_DATABASE: wgw_test
          WGW_TEST_MYSQL_USERNAME: root
          WGW_TEST_MYSQL_PASSWORD: root
        run: composer --working-dir packages/api run test:mysql
