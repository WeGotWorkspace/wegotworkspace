name: Release WeGotWorkspace

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_sqlite, simplexml, zip
          coverage: none

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Require signed annotated tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Ensure we validate the actual remote tag object (annotated tags are tag objects),
          # not a peeled commit ref that checkout may create in shallow/tag-less fetches.
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"

          TYPE="$(git cat-file -t "$TAG")"
          if [[ "$TYPE" != "tag" ]]; then
            echo "::error::${TAG} is not an annotated tag."
            echo "::error::Create and push a signed annotated tag from local git (GitHub web-created tags are lightweight/unsigned)."
            exit 1
          fi
          git cat-file -p "$TAG" > /tmp/tag-object.txt
          if ! grep -Eq 'BEGIN (PGP|SSH) SIGNATURE' /tmp/tag-object.txt; then
            echo "::error::${TAG} is not signed."
            echo "::error::Push a signed annotated tag from local git using GPG or SSH signing."
            exit 1
          fi

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: License policy (production dependencies)
        run: pnpm run check:licenses

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Storybook Vitest)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != 'true' ]; then
            pnpm --filter @wgw/apps exec playwright install chromium --with-deps
          else
            pnpm --filter @wgw/apps exec playwright install chromium
          fi

      - name: Quality gate (typegen, lint, format, API + apps done gates)
        run: pnpm run ci:quality

      - name: Build monorepo
        run: pnpm run build

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(tr -d '\n' < apps/wegotworkspace/VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets
        env:
          WGW_RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          WGW_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.WGW_RELEASE_SIGNING_PRIVATE_KEY }}
        run: node tools/build-wegotworkspace-release.mjs

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            dist/releases/*.zip
            dist/releases/manifest.json
            dist/releases/manifest.sig

      - name: Set up Docker Buildx
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push install image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/install/Dockerfile
          push: true
          tags: |
            ghcr.io/wegotworkspace/wegotworkspace:${{ steps.release_version.outputs.value }}
            ghcr.io/wegotworkspace/wegotworkspace:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test install image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          IMAGE="ghcr.io/wegotworkspace/wegotworkspace:${{ steps.release_version.outputs.value }}"
          docker pull "$IMAGE"
          docker run -d --name wgw-install-smoke -p 127.0.0.1:18080:80 \
            -e WGW_WAIT_FOR_DB=0 \
            -e WGW_DB_HOST= \
            "$IMAGE"
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/api/v1/health | grep -q '"status":"ok"'; then
              echo "Health check passed."
              docker rm -f wgw-install-smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::Install image health check failed."
          docker logs wgw-install-smoke || true
          docker rm -f wgw-install-smoke
          exit 1
