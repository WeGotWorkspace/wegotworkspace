name: Release WeGotWorkspace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_sqlite, simplexml, zip
          coverage: none

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Require signed annotated tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Ensure we validate the actual remote tag object (annotated tags are tag objects),
          # not a peeled commit ref that checkout may create in shallow/tag-less fetches.
          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}"

          TYPE="$(git cat-file -t "$TAG")"
          if [[ "$TYPE" != "tag" ]]; then
            echo "::error::${TAG} is not an annotated tag."
            echo "::error::Create and push a signed annotated tag from local git (GitHub web-created tags are lightweight/unsigned)."
            exit 1
          fi
          git cat-file -p "$TAG" > /tmp/tag-object.txt
          if ! grep -Eq 'BEGIN (PGP|SSH) SIGNATURE' /tmp/tag-object.txt; then
            echo "::error::${TAG} is not signed."
            echo "::error::Push a signed annotated tag from local git using GPG or SSH signing."
            exit 1
          fi

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: License policy (production dependencies)
        run: pnpm run check:licenses

      - name: Quality gate (typegen, lint, format, typecheck, API done gate)
        run: pnpm run ci:quality

      - name: Build monorepo
        run: pnpm run build

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(tr -d '\n' < apps/wegotworkspace/VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets
        env:
          WGW_RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          WGW_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.WGW_RELEASE_SIGNING_PRIVATE_KEY }}
        run: node tools/build-wegotworkspace-release.mjs

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            dist/releases/*.zip
            dist/releases/manifest.json
            dist/releases/manifest.sig
