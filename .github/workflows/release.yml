name: Release WeGotWorkspace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_sqlite, simplexml, zip
          coverage: none

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm run build

      - name: Build release assets
        env:
          WGW_RELEASE_VERSION: ${{ github.ref_name }}
          WGW_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.WGW_RELEASE_SIGNING_PRIVATE_KEY }}
        run: node tools/build-wegotworkspace-release.mjs

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            dist/releases/*.zip
            dist/releases/manifest.json
            dist/releases/manifest.sig
