name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # release:publish pushes the VERSION commit then the tag; Release workflow builds that commit.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_sqlite, simplexml, zip
          coverage: none

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS workspace
        run: pnpm install --frozen-lockfile

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: License policy (production dependencies)
        run: pnpm run check:licenses

      - name: Quality gate (typegen, lint, format, typecheck, API done gate)
        run: pnpm run ci:quality

      - name: Build (Composer + UI via Turborepo)
        run: pnpm run build
