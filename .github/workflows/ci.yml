name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # release:publish pushes the VERSION commit then the tag; Release workflow builds that commit.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_sqlite, simplexml, zip
          coverage: none

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install JS workspace
        run: pnpm install --frozen-lockfile

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: License policy (production dependencies)
        run: pnpm run check:licenses

      - name: Reject Cursor commit attribution
        if: github.event_name == 'pull_request'
        run: node tools/git/check-commit-range-attribution.mjs "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"

      - name: Reject Cursor PR description attribution
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node tools/git/check-pr-body-attribution.mjs

      - name: Quality gate (typegen, lint, format, typecheck, API done gate)
        run: pnpm run ci:quality

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Storybook Vitest)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != 'true' ]; then
            pnpm --filter @wgw/apps exec playwright install chromium --with-deps
          else
            pnpm --filter @wgw/apps exec playwright install chromium
          fi

      - name: Storybook Vitest (smoke)
        env:
          STORYBOOK_A11Y_GATE: "1"
        run: pnpm --filter @wgw/apps run test:storybook:ci

      - name: Chromatic (optional)
        if: vars.CHROMATIC_ENABLED == 'true'
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: pnpm --filter @wgw/apps exec chromatic --build-script-name build-storybook --exit-zero-on-changes

      - name: Build (Composer + UI via Turborepo)
        run: pnpm run build

  chromatic:
    if: >-
      vars.CHROMATIC_ENABLED == 'true' &&
      (github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install JS workspace
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/apps
          onlyChanged: true
          exitZeroOnChanges: true

  api-mysql:
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wgw_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, dom, iconv, imap, json, mbstring, pdo, pdo_mysql, pdo_sqlite, simplexml, zip
          coverage: none

      - name: Install backend Composer dependencies
        run: composer --working-dir packages/api install --no-interaction --prefer-dist

      - name: Prepare Laravel env for tests
        run: |
          cp packages/api/.env.example packages/api/.env
          php packages/api/artisan key:generate --force --no-interaction

      - name: API tests (MySQL wgw connection)
        env:
          WGW_TEST_DRIVER: mysql
          WGW_TEST_MYSQL_HOST: 127.0.0.1
          WGW_TEST_MYSQL_PORT: 3306
          WGW_TEST_MYSQL_DATABASE: wgw_test
          WGW_TEST_MYSQL_USERNAME: root
          WGW_TEST_MYSQL_PASSWORD: root
        run: composer --working-dir packages/api run test:mysql
